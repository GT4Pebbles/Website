body: "In the laboratory in Braunschweig, work on the enjection mechanism for dust into the vacuum chamber is progressing.<br>The dust injection mechanism relies on a cogwheel thta spins at around 8000RPM. Calvin Knoop and the technical team at the University of Braunschweig are developing the mechanism so that it will be ready for use when the vacuum chanber arriges in Braunschweit in September 2026."
